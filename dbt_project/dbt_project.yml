name: olist_dbt
version: 1.0.0
config-version: 2

profile: olist_profile

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  olist_dbt:
    +schema: analytics
    +persist_docs:
      relation: true
      columns: true
    staging:
      +materialized: view
      +tags: ["staging"]
    silver:
      +materialized: view
      +tags: ["silver"]
    marts:
      +materialized: table
      +tags: ["marts"]
