version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: olist_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-olist_dw}
      POSTGRES_USER: ${POSTGRES_USER:-olist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-olist}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-olist} -d ${POSTGRES_DB:-olist_dw}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: olist_airflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__COSMOS__ENABLE_TELEMETRY: "False"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-olist_dw}
      POSTGRES_USER: ${POSTGRES_USER:-olist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-olist}
    command: standalone
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - .:/opt/project

  dbt:
    build:
      context: .
      dockerfile: docker/Dockerfile.dbt
    container_name: olist_dbt
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-olist_dw}
      POSTGRES_USER: ${POSTGRES_USER:-olist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-olist}
    volumes:
      - .:/opt/project

  ai_agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.ai
    container_name: olist_ai_agent
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-olist_dw}
      POSTGRES_USER: ${POSTGRES_USER:-olist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-olist}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "8000:8000"
    volumes:
      - .:/opt/project

volumes:
  postgres_data:
